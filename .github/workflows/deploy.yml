name: Deploy to Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Load production configuration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SUPABASE_URL_SECRET: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY_SECRET: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          project_file="${RUNNER_TEMP}/cloudflare-pages-project.json"
          curl --fail --silent --show-error             "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/iekprueba"             --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"             --output "${project_file}"

          cloudflare_url="$(jq -r '
            .result.deployment_configs.production.env_vars.VITE_SUPABASE_URL.value //
            .result.canonical_deployment.env_vars.VITE_SUPABASE_URL.value //
            empty
          ' "${project_file}")"
          cloudflare_key="$(jq -r '
            .result.deployment_configs.production.env_vars.VITE_SUPABASE_ANON_KEY.value //
            .result.canonical_deployment.env_vars.VITE_SUPABASE_ANON_KEY.value //
            empty
          ' "${project_file}")"

          supabase_url="${SUPABASE_URL_SECRET:-${cloudflare_url}}"
          supabase_key="${SUPABASE_ANON_KEY_SECRET:-${cloudflare_key}}"

          if [[ -z "${supabase_url}" || -z "${supabase_key}" ]]; then
            echo "::error::Faltan VITE_SUPABASE_URL o VITE_SUPABASE_ANON_KEY en GitHub y Cloudflare."
            exit 1
          fi

          echo "::add-mask::${supabase_url}"
          echo "::add-mask::${supabase_key}"
          {
            echo "VITE_SUPABASE_URL=${supabase_url}"
            echo "VITE_SUPABASE_ANON_KEY=${supabase_key}"
          } >> "${GITHUB_ENV}"

      - name: Stamp application version
        run: sed -i "s/__BUILD_VERSION__/${GITHUB_SHA}/g" public/sw.js

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=iekprueba
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
